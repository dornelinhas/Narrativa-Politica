  <!-- Formas coloridas do estilo Brutalista NP -->
  <circle cx="6" cy="6" r="3" fill="#DF2028"/>
  <rect x="22" y="4" width="6" height="4" fill="#FF6BCA"/>
  <rect x="24" y="24" width="4" height="4" fill="#A4CD39"/>
  <rect x="4" y="22" width="4" height="6" fill="#FFE65A"/>
  
  <!-- Texto NP -->
  <text x="16" y="18" text-anchor="middle" dominant-baseline="central" font-family="sans-serif" font-weight="900" font-size="12" fill="white">NP</text>
